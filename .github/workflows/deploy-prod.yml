name: Deploy Prod

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Yandex Container Registry
        run: |
          echo ${{ secrets.Y_TOKEN }} | docker login \
            --username oauth \
            --password-stdin cr.yandex

      - name: Build and push
        run: |
          docker build -t cr.yandex/${{ secrets.CONTAINER_REGISTRY }}/bot-prod:latest .
          docker push cr.yandex/${{ secrets.CONTAINER_REGISTRY }}/bot-prod:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/termeet-bot
            echo ${{ secrets.Y_TOKEN }} | docker login \
              --username oauth \
              --password-stdin cr.yandex
            docker compose -f docker-compose-prod.yml up -d --pull always
