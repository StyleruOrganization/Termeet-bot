name: Deploy Dev

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check .env-example changes
        if: github.event_name == 'push'
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q "\.env-example"; then
            echo "❌ .env-example изменился!"
            echo ""
            echo "Обнови .env на сервере, затем перезапусти workflow вручную:"
            echo "Actions → Deploy Dev → Run workflow"
            exit 1
          fi

      - name: Login to Yandex Container Registry
        run: |
          echo ${{ secrets.Y_TOKEN }} | docker login \
            --username oauth \
            --password-stdin cr.yandex

      - name: Build and push
        run: |
          docker build -t cr.yandex/${{ secrets.CONTAINER_REGISTRY }}/bot-dev:latest .
          docker push cr.yandex/${{ secrets.CONTAINER_REGISTRY }}/bot-dev:latest

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose-dev.yml"
          target: "bot-dev"

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd bot-dev
            echo ${{ secrets.Y_TOKEN }} | docker login \
              --username oauth \
              --password-stdin cr.yandex
            docker compose -f docker-compose-dev.yml up -d --pull always
