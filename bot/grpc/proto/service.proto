syntax = "proto3";

import "google/protobuf/empty.proto";

package service;

enum FeedbackType {
    HELP = 0;
    SUGGESTION = 1;
    BUG = 2;
    PARTNERSHIP = 3;
    OTHER = 4;
}

enum CommunicationChannel {
    EMAIL = 0;
    TELEGRAM = 1;
}

message FeedbackSchema {
    FeedbackType type = 1;
    CommunicationChannel communication_channel = 2;
    string contact = 3;
    string message = 4;
}

message FeedbackResponse {
    repeated FeedbackSchema feedbacks = 1;
}

service Feedback {
    rpc GetAllFeedback (google.protobuf.Empty) returns (FeedbackResponse);
}
